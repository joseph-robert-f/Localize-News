name: Scrape Township Documents

# Runs nightly at 3am UTC.
# Can also be triggered manually from the GitHub Actions UI with optional filters.

on:
  schedule:
    - cron: '0 3 * * *'   # nightly at 3am UTC
  workflow_dispatch:
    inputs:
      township_id:
        description: 'Township ID to scrape (leave blank to scrape all due)'
        required: false
        default: ''
      force:
        description: 'Force re-scrape even if not yet due (bypasses queue)'
        type: boolean
        default: false
      since_days:
        description: 'Only collect documents from the last N days (0 = no cutoff, blank = default 180)'
        required: false
        default: ''

jobs:
  scrape:
    name: Run scraper pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npx tsx scripts/scrape.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TOWNSHIP_ID: ${{ inputs.township_id }}
          FORCE_SCRAPE: ${{ inputs.force }}
          SINCE_DAYS: ${{ inputs.since_days }}
